<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱美水獭</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(160deg, #FFF0F7 0%, #F5E6FF 50%, #E8F4FF 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* floating sparkles background */
  .bg-sparkles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .sp {
    position: absolute;
    border-radius: 50%;
    animation: floatSp linear infinite;
    opacity: 0;
  }
  @keyframes floatSp {
    0%   { opacity:0; transform: translateY(0) scale(0); }
    10%  { opacity:.9; }
    90%  { opacity:.6; }
    100% { opacity:0; transform: translateY(-120vh) scale(1.2) rotate(360deg); }
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── MIRROR / VANITY STAND ── */
  .vanity {
    position: relative;
    margin-bottom: -10px;
    z-index: 2;
  }

  /* ── OTTER SVG WRAPPER ── */
  .otter-wrap {
    position: relative;
    animation: otterBob 3s ease-in-out infinite;
    cursor: pointer;
    z-index: 3;
  }
  @keyframes otterBob {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%     { transform: translateY(-10px) rotate(1deg); }
  }
  .otter-wrap:hover { animation: otterWiggle .5s ease-in-out 3; }
  @keyframes otterWiggle {
    0%,100% { transform: rotate(0); }
    25%     { transform: rotate(-6deg) scale(1.05); }
    75%     { transform: rotate(6deg) scale(1.05); }
  }

  /* blink animation */
  @keyframes blink {
    0%,94%,100% { transform: scaleY(1); }
    96%,98%     { transform: scaleY(0.08); }
  }

  /* heart pop */
  .heart {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    pointer-events: none;
    animation: heartPop 2s ease forwards;
  }
  @keyframes heartPop {
    0%   { opacity:0; transform: translateY(0) scale(0) rotate(-10deg); }
    20%  { opacity:1; transform: translateY(-20px) scale(1.2) rotate(5deg); }
    80%  { opacity:.8; transform: translateY(-60px) scale(0.9) rotate(-5deg); }
    100% { opacity:0; transform: translateY(-90px) scale(0.5); }
  }

  /* lipstick sway */
  @keyframes lipstickSway {
    0%,100% { transform: rotate(-8deg); }
    50%     { transform: rotate(-2deg); }
  }

  /* mirror shine */
  @keyframes mirrorShine {
    0%,100% { opacity: 0; transform: translateX(-100%) rotate(25deg); }
    50%     { opacity: .6; transform: translateX(200%) rotate(25deg); }
  }

  /* title */
  .title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 32px;
    color: #C44D75;
    text-shadow: 2px 3px 0 rgba(196,77,117,.2);
    margin-top: 18px;
    letter-spacing: 4px;
    animation: titleFloat 4s ease-in-out infinite;
  }
  @keyframes titleFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-5px); }
  }

  .subtitle {
    font-size: 13px;
    color: #C084A0;
    margin-top: 6px;
    font-weight: 700;
    letter-spacing: 2px;
    opacity: .8;
  }

  /* click hint */
  .hint {
    font-size: 11px;
    color: #D4A0BC;
    margin-top: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100% { opacity: .5; }
    50%     { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Background sparkles -->
<div class="bg-sparkles" id="bg"></div>

<div class="scene">

  <!-- Vanity mirror above otter -->
  <div class="vanity">
    <svg width="200" height="170" viewBox="0 0 200 170" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- mirror stand legs -->
      <rect x="88" y="140" width="7" height="28" rx="3" fill="#E8B4C8"/>
      <rect x="105" y="140" width="7" height="28" rx="3" fill="#E8B4C8"/>
      <rect x="72" y="163" width="56" height="7" rx="3.5" fill="#D4A0BC"/>

      <!-- mirror frame outer -->
      <ellipse cx="100" cy="75" rx="68" ry="78" fill="#F9D0E4"/>
      <ellipse cx="100" cy="75" rx="62" ry="72" fill="#FFF0F7"/>

      <!-- mirror frame decorations (pearls) -->
      <circle cx="100" cy="5"  r="4.5" fill="#F4A0C0"/>
      <circle cx="128" cy="11" r="3.5" fill="#F4A0C0"/>
      <circle cx="150" cy="27" r="3.5" fill="#F4A0C0"/>
      <circle cx="163" cy="50" r="3.5" fill="#F4A0C0"/>
      <circle cx="165" cy="77" r="3.5" fill="#F4A0C0"/>
      <circle cx="157" cy="103" r="3.5" fill="#F4A0C0"/>
      <circle cx="143" cy="126" r="3.5" fill="#F4A0C0"/>
      <circle cx="72"  cy="11" r="3.5" fill="#F4A0C0"/>
      <circle cx="50"  cy="27" r="3.5" fill="#F4A0C0"/>
      <circle cx="37"  cy="50" r="3.5" fill="#F4A0C0"/>
      <circle cx="35"  cy="77" r="3.5" fill="#F4A0C0"/>
      <circle cx="43"  cy="103" r="3.5" fill="#F4A0C0"/>
      <circle cx="57"  cy="126" r="3.5" fill="#F4A0C0"/>

      <!-- mirror glass -->
      <ellipse cx="100" cy="75" rx="55" ry="65" fill="url(#mirrorGrad)"/>

      <!-- mirror shine sweep -->
      <clipPath id="mirrorClip">
        <ellipse cx="100" cy="75" rx="55" ry="65"/>
      </clipPath>
      <rect x="-60" y="0" width="50" height="160" fill="white" opacity=".0" clip-path="url(#mirrorClip)"

      <!-- reflection of cute face in mirror -->
      <!-- head reflection -->
      <ellipse cx="100" cy="80" rx="30" ry="26" fill="#C8906A" opacity=".85"/>
      <!-- face reflection lighter -->
      <ellipse cx="100" cy="84" rx="22" ry="18" fill="#E0B090" opacity=".9"/>
      <!-- eyes reflection -->
      <ellipse cx="91" cy="80" rx="5" ry="5.5" fill="#2A1A10" style="animation:blink 3.5s ease-in-out infinite"/>
      <ellipse cx="109" cy="80" rx="5" ry="5.5" fill="#2A1A10" style="animation:blink 3.5s ease-in-out .08s infinite"/>
      <circle cx="92.5" cy="78.5" r="1.8" fill="white"/>
      <circle cx="110.5" cy="78.5" r="1.8" fill="white"/>
      <!-- nose -->
      <ellipse cx="100" cy="87" rx="3.5" ry="2.5" fill="#C06060"/>
      <!-- lipstick smile reflection -->
      <path d="M93 92 Q100 97 107 92" stroke="#E05080" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <!-- blush -->
      <ellipse cx="87" cy="88" rx="6" ry="4" fill="#FFB0C8" opacity=".45"/>
      <ellipse cx="113" cy="88" rx="6" ry="4" fill="#FFB0C8" opacity=".45"/>
      <!-- little crown/tiara reflection -->
      <path d="M82 60 L87 52 L92 60 L100 48 L108 60 L113 52 L118 60" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="100" cy="47" r="3" fill="#FFD700"/>
      <circle cx="87" cy="51" r="2" fill="#F4A0C0"/>
      <circle cx="113" cy="51" r="2" fill="#F4A0C0"/>

      <defs>
        <radialGradient id="mirrorGrad" cx="35%" cy="30%" r="70%">
          <stop offset="0%"   stop-color="#EEF6FF"/>
          <stop offset="60%"  stop-color="#D8EEFF"/>
          <stop offset="100%" stop-color="#C0D8F0"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- OTTER -->
  <div class="otter-wrap" id="otter" onclick="popHearts(event)">
    <svg width="320" height="310" viewBox="0 0 320 310" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- ── TAIL ── -->
      <ellipse cx="160" cy="295" rx="42" ry="16" fill="#8B5E3C"/>
      <ellipse cx="160" cy="295" rx="30" ry="10" fill="#A07050"/>

      <!-- ── BODY ── -->
      <ellipse cx="160" cy="230" rx="80" ry="75" fill="#8B5E3C"/>
      <!-- belly patch -->
      <ellipse cx="160" cy="238" rx="52" ry="52" fill="#D4A87A"/>

      <!-- ── ARMS ── -->
      <!-- left arm (holding lipstick) -->
      <g style="transform-origin: 95px 210px; animation: lipstickSway 2.5s ease-in-out infinite;">
        <ellipse cx="82" cy="220" rx="24" ry="16" fill="#8B5E3C" transform="rotate(-30 82 220)"/>
        <!-- paw left -->
        <ellipse cx="65" cy="236" rx="16" ry="11" fill="#A07050"/>
        <circle cx="57" cy="232" r="4.5" fill="#A07050"/>
        <circle cx="63" cy="240" r="4" fill="#A07050"/>
        <circle cx="72" cy="243" r="4" fill="#A07050"/>
        <!-- lipstick in paw -->
        <rect x="42" y="196" width="12" height="32" rx="4" fill="#E8D0E0"/>
        <rect x="42" y="188" width="12" height="14" rx="4" fill="#E03070"/>
        <ellipse cx="48" cy="188" rx="6" ry="4" fill="#FF6090"/>
        <!-- lipstick label stripe -->
        <rect x="44" y="208" width="8" height="3" rx="1" fill="#D0B0C0" opacity=".6"/>
      </g>

      <!-- right arm (holding compact mirror) -->
      <ellipse cx="238" cy="220" rx="24" ry="16" fill="#8B5E3C" transform="rotate(30 238 220)"/>
      <!-- paw right -->
      <ellipse cx="255" cy="236" rx="16" ry="11" fill="#A07050"/>
      <circle cx="263" cy="232" r="4.5" fill="#A07050"/>
      <circle cx="257" cy="240" r="4" fill="#A07050"/>
      <circle cx="248" cy="243" r="4" fill="#A07050"/>
      <!-- compact mirror in right paw -->
      <ellipse cx="272" cy="210" rx="22" ry="20" fill="#E8D0DC"/>
      <ellipse cx="272" cy="210" rx="22" ry="20" fill="none" stroke="#C090A8" stroke-width="3"/>
      <!-- hinge -->
      <rect x="260" y="208" width="24" height="3" rx="1.5" fill="#C090A8"/>
      <!-- mirror glass top half -->
      <ellipse cx="272" cy="202" rx="18" ry="9" fill="url(#compactGrad)"/>
      <!-- powder bottom half -->
      <ellipse cx="272" cy="218" rx="18" ry="9" fill="#F0D0E0"/>
      <ellipse cx="272" cy="218" rx="14" ry="7" fill="#FFB8D0" opacity=".7"/>
      <!-- compact hinge dot -->
      <circle cx="272" cy="210" r="2.5" fill="#C090A8"/>

      <!-- ── LEGS / FEET ── -->
      <!-- left foot -->
      <ellipse cx="122" cy="288" rx="28" ry="16" fill="#8B5E3C" transform="rotate(-10 122 288)"/>
      <ellipse cx="112" cy="294" rx="20" ry="10" fill="#A07050" transform="rotate(-10 112 294)"/>
      <circle cx="97"  cy="295" r="5" fill="#A07050"/>
      <circle cx="105" cy="300" r="5" fill="#A07050"/>
      <circle cx="115" cy="302" r="5" fill="#A07050"/>
      <!-- right foot -->
      <ellipse cx="198" cy="288" rx="28" ry="16" fill="#8B5E3C" transform="rotate(10 198 288)"/>
      <ellipse cx="208" cy="294" rx="20" ry="10" fill="#A07050" transform="rotate(10 208 294)"/>
      <circle cx="223" cy="295" r="5" fill="#A07050"/>
      <circle cx="215" cy="300" r="5" fill="#A07050"/>
      <circle cx="205" cy="302" r="5" fill="#A07050"/>

      <!-- ── HEAD ── -->
      <ellipse cx="160" cy="138" rx="72" ry="66" fill="#8B5E3C"/>

      <!-- ── EARS ── -->
      <!-- left ear -->
      <ellipse cx="96"  cy="85" rx="20" ry="18" fill="#8B5E3C"/>
      <ellipse cx="96"  cy="85" rx="12" ry="11" fill="#C08060"/>
      <!-- right ear -->
      <ellipse cx="224" cy="85" rx="20" ry="18" fill="#8B5E3C"/>
      <ellipse cx="224" cy="85" rx="12" ry="11" fill="#C08060"/>

      <!-- ear accessories: tiny pearl earrings -->
      <circle cx="82"  cy="100" r="5.5" fill="white"/>
      <circle cx="82"  cy="100" r="5.5" fill="none" stroke="#F4A0C0" stroke-width="1.5"/>
      <circle cx="238" cy="100" r="5.5" fill="white"/>
      <circle cx="238" cy="100" r="5.5" fill="none" stroke="#F4A0C0" stroke-width="1.5"/>

      <!-- ── FACE LIGHT PATCH ── -->
      <ellipse cx="160" cy="148" rx="52" ry="45" fill="#C89068"/>

      <!-- ── EYES ── -->
      <!-- eye whites -->
      <ellipse cx="133" cy="132" rx="16" ry="17" fill="white"/>
      <ellipse cx="187" cy="132" rx="16" ry="17" fill="white"/>
      <!-- iris -->
      <ellipse cx="133" cy="134" rx="11" ry="12" fill="#2A1A10" style="animation:blink 4s ease-in-out infinite"/>
      <ellipse cx="187" cy="134" rx="11" ry="12" fill="#2A1A10" style="animation:blink 4s ease-in-out .1s infinite"/>
      <!-- iris color ring -->
      <ellipse cx="133" cy="134" rx="8" ry="9" fill="#3D2010" style="animation:blink 4s ease-in-out infinite"/>
      <ellipse cx="187" cy="134" rx="8" ry="9" fill="#3D2010" style="animation:blink 4s ease-in-out .1s infinite"/>
      <!-- pupil -->
      <ellipse cx="133" cy="135" rx="5" ry="5.5" fill="#0A0808" style="animation:blink 4s ease-in-out infinite"/>
      <ellipse cx="187" cy="135" rx="5" ry="5.5" fill="#0A0808" style="animation:blink 4s ease-in-out .1s infinite"/>
      <!-- eye shine -->
      <circle cx="128" cy="129" r="3.5" fill="white"/>
      <circle cx="182" cy="129" r="3.5" fill="white"/>
      <circle cx="136" cy="133" r="1.5" fill="white"/>
      <circle cx="190" cy="133" r="1.5" fill="white"/>

      <!-- ── EYELASHES (makeup!) ── -->
      <!-- left lashes -->
      <line x1="118" y1="118" x2="113" y2="111" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="126" y1="115" x2="123" y2="107" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="134" y1="114" x2="134" y2="106" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="142" y1="115" x2="145" y2="108" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="148" y1="119" x2="153" y2="113" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <!-- right lashes -->
      <line x1="172" y1="119" x2="167" y2="113" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="178" y1="115" x2="175" y2="108" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="186" y1="114" x2="186" y2="106" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="194" y1="115" x2="197" y2="108" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
      <line x1="200" y1="118" x2="207" y2="112" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>

      <!-- ── EYESHADOW ── -->
      <ellipse cx="133" cy="125" rx="16" ry="7" fill="#C080C8" opacity=".35"/>
      <ellipse cx="187" cy="125" rx="16" ry="7" fill="#C080C8" opacity=".35"/>

      <!-- ── NOSE ── -->
      <ellipse cx="160" cy="157" rx="10" ry="7" fill="#8B3050"/>
      <ellipse cx="160" cy="155" rx="7" ry="4" fill="#B05070"/>

      <!-- ── MOUTH ── -->
      <path d="M148 165 Q160 175 172 165" stroke="#8B3050" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- lipstick on lips -->
      <path d="M148 165 Q160 174 172 165 Q166 168 160 169 Q154 168 148 165Z" fill="#E03070" opacity=".8"/>

      <!-- ── WHISKERS ── -->
      <!-- left -->
      <line x1="108" y1="160" x2="145" y2="158" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="105" y1="165" x2="144" y2="164" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="108" y1="170" x2="145" y2="169" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>
      <!-- right -->
      <line x1="175" y1="158" x2="212" y2="160" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="176" y1="164" x2="215" y2="165" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="175" y1="169" x2="212" y2="170" stroke="#C8A888" stroke-width="1.5" stroke-linecap="round"/>

      <!-- ── BLUSH ── -->
      <ellipse cx="115" cy="155" rx="18" ry="12" fill="#FFB0C8" opacity=".5"/>
      <ellipse cx="205" cy="155" rx="18" ry="12" fill="#FFB0C8" opacity=".5"/>

      <!-- ── TIARA / CROWN ── -->

            stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- crown gems -->
      <circle cx="160" cy="72" r="6" fill="#FF6090"/>
      <circle cx="140" cy="70" r="4.5" fill="#A060FF"/>
      <circle cx="180" cy="70" r="4.5" fill="#60C0FF"/>
      <circle cx="116" cy="80" r="3.5" fill="#FFD700"/>
      <circle cx="204" cy="80" r="3.5" fill="#FFD700"/>
      <!-- crown base band -->
      <rect x="106" y="93" width="108" height="8" rx="4" fill="#FFD700" opacity=".7"/>

      <!-- ── NAIL POLISH on toes (cute detail) ── -->
      <circle cx="97"  cy="293" r="3.5" fill="#FF6090"/>
      <circle cx="105" cy="298" r="3.5" fill="#FF6090"/>
      <circle cx="115" cy="300" r="3.5" fill="#FF6090"/>
      <circle cx="223" cy="293" r="3.5" fill="#FF6090"/>
      <circle cx="215" cy="298" r="3.5" fill="#FF6090"/>
      <circle cx="205" cy="300" r="3.5" fill="#FF6090"/>

      <!-- ── NECKLACE ── -->
      <path d="M112 178 Q160 195 208 178" stroke="#F4D0E0" stroke-width="2" fill="none"/>
      <circle cx="160" cy="194" r="5" fill="#FFD0E8"/>
      <circle cx="160" cy="194" r="5" fill="none" stroke="#F4A0C0" stroke-width="1.5"/>
      <circle cx="147" cy="190" r="3.5" fill="#FFD0E8"/>
      <circle cx="173" cy="190" r="3.5" fill="#FFD0E8"/>
      <circle cx="136" cy="184" r="3" fill="#FFD0E8"/>
      <circle cx="184" cy="184" r="3" fill="#FFD0E8"/>

      <defs>
        <radialGradient id="compactGrad" cx="35%" cy="30%" r="70%">
          <stop offset="0%"   stop-color="#EEF6FF"/>
          <stop offset="100%" stop-color="#C8E0F8"/>
        </radialGradient>
      </defs>
    </svg>

    <!-- floating hearts container -->
    <div id="hearts"></div>
  </div>

  <div class="title">爱美小水獭</div>
  <div class="subtitle">美丽是一种态度 ✦ 优雅是一种生活</div>
  <div class="hint">点击水獭 ♡</div>
</div>

<script>
// ── Background sparkles ──
const bg = document.getElementById('bg');
const colors = ['#FFB0D0','#F4A0C0','#D8B4FF','#B8D8FF','#FFD0E8','#FFE8B0'];
for(let i=0; i<28; i++){
  const sp = document.createElement('div');
  sp.className='sp';
  const size = 4 + Math.random()*10;
  sp.style.cssText=`
    width:${size}px; height:${size}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    left:${Math.random()*100}%;
    bottom:-${size}px;
    animation-duration:${6+Math.random()*10}s;
    animation-delay:${Math.random()*8}s;
  `;
  bg.appendChild(sp);
}

// ── Heart pop on click ──
const heartsEl = document.getElementById('hearts');
const heartSymbols = ['♡','♥','💕','✦','✿','⋆'];
function popHearts(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for(let i=0; i<6; i++){
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
    const colors2 = ['#FF6090','#C060FF','#60B8FF','#FF90B0','#FFD700'];
    h.style.cssText=`
      left:${x + (Math.random()-0.5)*60}px;
      top:${y - 10}px;
      color:${colors2[Math.floor(Math.random()*colors2.length)]};
      animation-delay:${i*0.08}s;
      font-size:${14+Math.random()*14}px;
    `;
    heartsEl.appendChild(h);
    setTimeout(()=>h.remove(), 2200);
  }
}
</script>
</body>
</html>
