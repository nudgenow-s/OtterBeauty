<!DOCTYPE html>
<html>
<body>
    <canvas id="otterCanvas" width="400" height="400" style="border:1px solid #d3d3d3;"></canvas>

    <script>
        const canvas = document.getElementById('otterCanvas');
        const ctx = canvas.getContext('2d');

        function drawOtter() {
            // 1. 身体/头部
            ctx.fillStyle = '#A67B5B';
            ctx.beginPath();
            ctx.ellipse(200, 200, 120, 100, 0, 0, Math.PI * 2);
            ctx.fill();

            // 2. 耳朵
            ctx.beginPath();
            ctx.arc(120, 140, 20, 0, Math.PI * 2); // 左耳
            ctx.arc(280, 140, 20, 0, Math.PI * 2); // 右耳
            ctx.fill();

            // 3. 脸部浅色区域
            ctx.fillStyle = '#D2B48C';
            ctx.beginPath();
            ctx.ellipse(200, 220, 90, 70, 0, 0, Math.PI * 2);
            ctx.fill();

            // 4. 眼睛
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(160, 190, 8, 0, Math.PI * 2); // 左眼
            ctx.arc(240, 190, 8, 0, Math.PI * 2); // 右眼
            ctx.fill();

            // 5. 鼻子 (倒三角形)
            ctx.beginPath();
            ctx.moveTo(190, 220);
            ctx.lineTo(210, 220);
            ctx.lineTo(200, 240);
            ctx.closePath();
            ctx.fill();

            // 6. 胡须
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            // 左侧
            ctx.moveTo(140, 220); ctx.lineTo(100, 215);
            ctx.moveTo(140, 235); ctx.lineTo(100, 245);
            // 右侧
            ctx.moveTo(260, 220); ctx.lineTo(300, 215);
            ctx.moveTo(260, 235); ctx.lineTo(300, 245);
            ctx.stroke();
        }

        drawOtter();
    </script>
</body>
</html>
