<!DOCTYPE html>
<html>
<head>
    <title>Otter Logic Prototype</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #fdf2f0; margin: 0; padding: 20px; }
        canvas { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .label { margin-top: 15px; font-family: monospace; color: #8d5b3e; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="otterCanvas" width="500" height="400"></canvas>
    <div class="label">Stella's Otter: Logical Path Reconstruction</div>

<script>
    const canvas = document.getElementById('otterCanvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        // --- 核心逻辑参数 ---
        const color = { fur: '#8d5b3e', belly: '#d9b99b', cushion: '#f5d1c9', phone: '#4a4a4a' };
        
        // 1. 绘制靠垫 (利用柔和的贝塞尔曲线)
        ctx.fillStyle = color.cushion;
        ctx.beginPath();
        ctx.moveTo(100, 300);
        ctx.bezierCurveTo(50, 320, 50, 380, 250, 380);
        ctx.bezierCurveTo(450, 380, 450, 320, 400, 300);
        ctx.bezierCurveTo(350, 280, 150, 280, 100, 300);
        ctx.fill();

        // 2. 绘制身体主体 (体现 2D 的丰满感)
        ctx.fillStyle = color.fur;
        ctx.beginPath();
        ctx.moveTo(180, 330);
        ctx.bezierCurveTo(120, 330, 110, 230, 160, 180); // 左侧身体
        ctx.bezierCurveTo(200, 130, 300, 130, 340, 180); // 头部到后背
        ctx.bezierCurveTo(390, 230, 380, 330, 320, 330); // 右侧身体
        ctx.fill();

        // 3. 尾巴 (核心特征)
        ctx.beginPath();
        ctx.moveTo(150, 320);
        ctx.quadraticCurveTo(80, 310, 70, 350);
        ctx.quadraticCurveTo(80, 370, 160, 330);
        ctx.fill();

        // 4. 浅色肚皮 (叠加逻辑)
        ctx.fillStyle = color.belly;
        ctx.beginPath();
        ctx.moveTo(200, 320);
        ctx.bezierCurveTo(160, 310, 160, 200, 250, 200);
        ctx.bezierCurveTo(340, 200, 340, 310, 300, 320);
        ctx.fill();

        // 5. 灵魂细节：眯眯眼 & 小鼻子
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        // 左眼
        ctx.beginPath(); ctx.arc(225, 225, 6, Math.PI, 0); ctx.stroke();
        // 右眼
        ctx.beginPath(); ctx.arc(275, 225, 6, Math.PI, 0); ctx.stroke();
        // 鼻子
        ctx.fillStyle = '#3e2723';
        ctx.beginPath(); ctx.ellipse(250, 240, 7, 5, 0, 0, Math.PI*2); ctx.fill();

        // 6. 手部 & 手机 (动作提取)
        ctx.fillStyle = color.phone;
        ctx.roundRect(235, 250, 30, 50, 5); ctx.fill(); // 手机
        
        ctx.fillStyle = color.fur;
        ctx.beginPath(); ctx.arc(220, 285, 12, 0, Math.PI*2); ctx.fill(); // 左手
        ctx.beginPath(); ctx.arc(280, 285, 12, 0, Math.PI*2); ctx.fill(); // 右手

        // 7. 标志性的小脚丫
        ctx.beginPath(); ctx.arc(190, 330, 15, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(310, 330, 15, 0, Math.PI*2); ctx.fill();
    }

    draw();
</script>
</body>
</html>
